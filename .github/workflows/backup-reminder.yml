                      <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:25px;border-left:3px solid #27ae60;">
                        <tr>
                          <td width="40" valign="middle" align="center">
                            <div style="background:#27ae60;color:#fff;width:28px;height:28px;border-radius:50%;text-align:center;line-height:28px;font-size:13px;font-weight:bold;">5</div>
                          </td>
                          <td style="padding:8px 10px;background:#f0fff4;">
                            <p style="margin:0;color:#333;font-size:14px;font-weight:bold;">Upload to GitHub Repo</p>
                            <a href="https://github.com/TharunKommaddi/OracleApex/tree/main/BackUp-App200" style="color:#27ae60;font-size:12px;text-decoration:none;">Click here to open GitHub Backup Folder</a>
                          </td>
                        </tr>
                      </table>

                      <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:25px;">
                        <tr><td align="center">
                          <a href="https://gd1895d7a91019d-h5vz0428ux25xs1n.adb.eu-frankfurt-1.oraclecloudapps.com/ords/f?p=4500"
                             style="background:#1a1a2e;color:#fff;padding:12px 24px;border-radius:6px;text-decoration:none;font-size:14px;font-weight:bold;display:inline-block;margin:5px;">
                            Open APEX Builder
                          </a>
                          &nbsp;
                          <a href="https://github.com/TharunKommaddi/OracleApex/tree/main/BackUp-App200"
                             style="background:#27ae60;color:#fff;padding:12px 24px;border-radius:6px;text-decoration:none;font-size:14px;font-weight:bold;display:inline-block;margin:5px;">
                            Open GitHub Folder
                          </a>
                        </td></tr>
                      </table>

                      <table width="100%" cellpadding="0" cellspacing="0" style="background:#fff9e6;border-left:4px solid #f39c12;border-radius:4px;">
                        <tr><td style="padding:15px;">
                          <p style="margin:0;color:#856404;font-size:13px;">
                            <strong>Pro Tip:</strong> Name your backup folder with today's date like
                            <code style="background:#f0e0a0;padding:2px 5px;border-radius:3px;">app_200/20260531_080000/f200.sql</code>
                          </p>
                        </td></tr>
                      </table>

                    </td></tr>
                  </table>

                  <table width="600" cellpadding="0" cellspacing="0" style="background:#1a1a2e;border-radius:0 0 12px 12px;">
                    <tr><td align="center" style="padding:20px;">
                      <p style="color:#a0a0c0;font-size:12px;margin:0;">Sent automatically every Monday at 8AM UTC</p>
                      <p style="color:#a0a0c0;font-size:12px;margin:8px 0 0 0;">APEX Backup Bot - TharunKommaddi/OracleApex</p>
