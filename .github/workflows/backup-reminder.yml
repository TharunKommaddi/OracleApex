name: Weekly Backup Reminder

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Send Backup Reminder Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Weekly APEX Backup Reminder - App 200"
          to: tharunkommaddi@gmail.com
          from: APEX Backup Bot <tharunkommaddi@gmail.com>
          content_type: text/html
          body: >
            <!DOCTYPE html>
            <html>
            <head><meta charset="UTF-8"></head>
            <body style="margin:0;padding:0;background:#f4f4f4;font-family:Arial,sans-serif;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr><td align="center" style="padding:30px 0;">

                  <table width="600" cellpadding="0" cellspacing="0" style="background:#1a1a2e;border-radius:12px 12px 0 0;">
                    <tr><td align="center" style="padding:30px;">
                      <h1 style="color:#ffffff;margin:0;font-size:24px;">APEX Backup Bot</h1>
                      <p style="color:#a0a0c0;margin:8px 0 0 0;font-size:13px;">Oracle APEX App 200 - Weekly Backup Reminder</p>
                    </td></tr>
                  </table>

                  <table width="600" cellpadding="0" cellspacing="0" style="background:#e74c3c;">
                    <tr><td align="center" style="padding:12px;">
                      <p style="color:#ffffff;margin:0;font-size:14px;font-weight:bold;">ACTION REQUIRED - Please backup your APEX app today!</p>
                    </td></tr>
                  </table>

                  <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;">
                    <tr><td style="padding:30px;">

                      <p style="color:#333;font-size:16px;margin:0 0 10px 0;">Hi <strong>Tharun</strong>,</p>
                      <p style="color:#555;font-size:14px;line-height:1.6;margin:0 0 25px 0;">
                        This is your <strong>weekly automated reminder</strong> to backup Oracle APEX App 200.
                        Regular backups protect your work!
                      </p>

                      <table width="100%" cellpadding="0" cellspacing="0" style="background:#f8f9ff;border:1px solid #e0e0ff;border-radius:8px;margin-bottom:25px;">
                        <tr><td style="padding:20px;">
                          <p style="margin:0 0 12px 0;color:#1a1a2e;font-size:15px;font-weight:bold;border-bottom:1px solid #e0e0ff;padding-bottom:10px;">App Details</p>
                          <table width="100%">
                            <tr>
                              <td style="color:#666;font-size:13px;padding:5px 0;width:40%;">App ID</td>
                              <td style="color:#333;font-size:13px;font-weight:bold;">200 - TharunKommaddi</td>
                            </tr>
                            <tr style="background:#f0f0ff;">
                              <td style="color:#666;font-size:13px;padding:5px 8px;">Pages</td>
                              <td style="color:#333;font-size:13px;font-weight:bold;">228 Pages</td>
                            </tr>
                            <tr>
                              <td style="color:#666;font-size:13px;padding:5px 0;">Version</td>
                              <td style="color:#333;font-size:13px;font-weight:bold;">APEX 24.2.16</td>
                            </tr>
                            <tr style="background:#f0f0ff;">
                              <td style="color:#666;font-size:13px;padding:5px 8px;">Export Size</td>
                              <td style="color:#333;font-size:13px;font-weight:bold;">~49 MB</td>
                            </tr>
                            <tr>
