                      </table>

                      <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:12px;border-left:3px solid #4a90d9;">
                        <tr>
                          <td width="40" valign="middle" align="center">
                            <div style="background:#1a1a2e;color:#fff;width:28px;height:28px;border-radius:50%;text-align:center;line-height:28px;font-size:13px;font-weight:bold;">3</div>
                          </td>
                          <td style="padding:8px 10px;background:#f8faff;">
                            <p style="margin:0;color:#333;font-size:14px;font-weight:bold;">Export / Import - Export</p>
                            <p style="margin:4px 0 0 0;color:#666;font-size:12px;">Keep all default settings and click Export</p>
                          </td>
                        </tr>
                      </table>

                      <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:12px;border-left:3px solid #4a90d9;">
                        <tr>
                          <td width="40" valign="middle" align="center">
                            <div style="background:#1a1a2e;color:#fff;width:28px;height:28px;border-radius:50%;text-align:center;line-height:28px;font-size:13px;font-weight:bold;">4</div>
                          </td>
                          <td style="padding:8px 10px;background:#f8faff;">
