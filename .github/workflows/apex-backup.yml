name: APEX App Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install SQLcl
        run: |
          wget -q https://download.oracle.com/otn_software/java/sqldeveloper/sqlcl-latest.zip
          unzip -q sqlcl-latest.zip
          chmod +x sqlcl/bin/sql
          echo "SQLcl installed!"
          ./sqlcl/bin/sql -version

      - name: Export APEX App 200
        env:
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_SERVICE: ${{ secrets.DB_SERVICE }}
        run: |
          BACKUP_DIR="BackUp-App200/app_200/$(date +%Y%m%d_%H%M%S)"
          mkdir -p "$BACKUP_DIR"
          echo "Backing up to: $BACKUP_DIR"

          ./sqlcl/bin/sql -nohistory \
            "${DB_USERNAME}/${DB_PASSWORD}@${DB_HOST}:1522/${DB_SERVICE}" \
            <<EOF
          apex export -applicationid 200 -dir ${GITHUB_WORKSPACE}/${BACKUP_DIR}
          exit
          EOF

          echo "Export done!"
          ls -la "$BACKUP_DIR"

      - name: Commit and Push
        run: |
          git config --global user.name "APEX Backup Bot"
          git config --global user.email "backup@tharunkommaddi.com"
          git add BackUp-App200/
          git diff --staged --quiet || git commit -m "Auto backup App 200 - $(date +%Y%m%d_%H%M%S)"
          git push
